<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Portfolio — Hightower Marketing</title>
    <meta http-equiv="refresh" content="0; url=/case-studies">
    <link rel="canonical" href="https://hightower-marketing.com/case-studies">
    <link rel="stylesheet" href="/aos.css">
    <script src="/aos.js"></script>
</head>
<body>
    <p>Redirecting to <a href="/case-studies">Case Studies</a>...</p>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof AOS !== 'undefined') {
            AOS.init({ duration: 800, easing: 'ease-out-cubic', once: true, offset: 50 });
        }
        let lastScroll = 0;
        const nav = document.querySelector('nav');
        if (nav) {
            window.addEventListener('scroll', function() {
                const currentScroll = window.pageYOffset;
                if (currentScroll > lastScroll && currentScroll > 100) {
                    nav.classList.add('nav-hidden');
                } else {
                    nav.classList.remove('nav-hidden');
                }
                lastScroll = currentScroll;
            });
        }
        const heroBg = document.querySelector('.hero-bg');
        if (heroBg) {
            window.addEventListener('scroll', function() {
                heroBg.style.transform = 'translateY(' + (window.pageYOffset * 0.3) + 'px)';
            });
        }
    });
    
        // ===== MOUSE TRACKING GLOW (homepage match) =====
        const cards = document.querySelectorAll('.product-card, .step, .service-card, .case-card, .blog-card, .pricing-card, .template-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // ===== SCROLL REVEAL ANIMATIONS =====
        const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in-1, .fade-in-2, .fade-in-3, .fade-in-4').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
            observer.observe(el);
        });
</script>
</body>
</html>

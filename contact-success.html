<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Message Sent — Hightower Marketing Strategies</title>
    <meta name="description" content="Your message has been sent. We'll be in touch within 24 hours.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0c0a09;
            --bg-elevated: #1c1917;
            --accent-gold: #d97706;
            --accent-gold-light: #f59e0b;
            --text-primary: #fafaf9;
            --text-secondary: #a8a29e;
            --text-muted: #78716c;
            --border: rgba(250, 250, 249, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .success-container {
            max-width: 480px;
            padding: 40px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(217, 119, 6, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 40px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            color: var(--text-secondary);
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .details {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
        }
        .details h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .details p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 8px;
        }
        .btn-primary {
            display: inline-block;
            background: var(--accent-gold);
            color: var(--bg-deep);
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: var(--accent-gold-light);
            transform: translateY(-2px);
        }
        .btn-secondary {
            display: inline-block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-top: 16px;
            transition: color 0.3s ease;
        }
        .btn-secondary:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon"></div>
        <h1>Message sent!</h1>
        <p>Thanks for reaching out. We read every message and typically respond within 24 hours.</p>
        
        <div class="details">
            <h3>What happens next</h3>
            <p>• You'll receive a confirmation email shortly</p>
            <p>• We'll review your project details</p>
            <p>• A team member will reply with next steps</p>
        </div>
        
        <a href="/" class="btn-primary">Back to Homepage →</a><br>
        <a href="/services" class="btn-secondary">Explore our services →</a>
    </div>
</body>
</html>
